<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f1923">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="宜寶信用通知">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>宜寶信用通知</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1923;--bg2:#162030;--bg3:#1e2d40;
  --surface:#1a2a3a;--border:#2a3d52;--border2:#3a5068;
  --ink:#e8f0f8;--ink2:#a8c0d8;--ink3:#6888a8;--ink4:#3a5068;
  --red:#e84545;--red2:#ff6b6b;--red-bg:rgba(232,69,69,.12);
  --orange:#f0833a;--orange-bg:rgba(240,131,58,.12);
  --yellow:#f0c040;--yellow-bg:rgba(240,192,64,.12);
  --green:#38c98a;--green-bg:rgba(56,201,138,.12);
  --blue:#4a9eff;--blue-bg:rgba(74,158,255,.12);
  --purple:#a78bfa;--purple-bg:rgba(167,139,250,.12);
  --shadow:0 4px 24px rgba(0,0,0,.3);
  --r:14px;--r2:10px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);min-height:100dvh;-webkit-tap-highlight-color:transparent;}

header{position:sticky;top:0;z-index:100;background:rgba(15,25,35,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.hd-top{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-ico{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#4a9eff,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:1.3rem;}
.logo h1{font-family:'DM Serif Display',serif;font-size:1.05rem;}
.logo p{font-size:.62rem;color:var(--ink3);margin-top:1px;}
.hd-btns{display:flex;gap:7px;}

.alert-bar{background:linear-gradient(90deg,rgba(232,69,69,.2),rgba(240,131,58,.1));border-bottom:1px solid rgba(232,69,69,.25);padding:8px 18px;font-size:.74rem;color:var(--red2);display:none;}
.alert-bar.show{display:flex;align-items:center;gap:8px;}

.tabs{display:flex;border-bottom:1px solid var(--border);}
.tab{flex:1;padding:10px;font-family:inherit;font-size:.75rem;font-weight:700;color:var(--ink3);background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;transition:all .2s;}
.tab.on{color:var(--blue);border-bottom-color:var(--blue);}
.tab-badge{display:inline-flex;align-items:center;justify-content:center;background:var(--red);color:#fff;font-size:.55rem;font-weight:900;min-width:14px;height:14px;border-radius:99px;padding:0 3px;margin-left:4px;}
.tab-badge.hidden{display:none;}

.page{display:none;}.page.on{display:block;}
.wrap{max-width:800px;margin:0 auto;padding:18px 16px 90px;}

/* SUMMARY */
.sum-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px;}
@media(min-width:600px){.sum-grid{grid-template-columns:repeat(4,1fr);}}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:center;}
.sum-val{font-family:'DM Serif Display',serif;font-size:1.5rem;margin-bottom:3px;}
.sum-label{font-size:.6rem;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;}

/* CARD LIST */
.cc-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden;transition:all .2s;}
.cc-card:hover{border-color:var(--border2);box-shadow:var(--shadow);}
.cc-card.urgent{border-left:3px solid var(--red);}
.cc-card.warn{border-left:3px solid var(--orange);}
.cc-card.soon{border-left:3px solid var(--yellow);}
.cc-card.ok{border-left:3px solid var(--green);}
.cc-card.paid{opacity:.5;}

.cc-header{padding:14px 16px 10px;display:flex;align-items:flex-start;gap:12px;}
.cc-icon{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
.cc-info{flex:1;min-width:0;}
.cc-name{font-weight:700;font-size:.95rem;margin-bottom:2px;}
.cc-bank{font-size:.68rem;color:var(--ink3);}
.cc-right{text-align:right;flex-shrink:0;}
.cc-due{font-size:.7rem;color:var(--ink3);margin-bottom:3px;}
.cc-days{font-size:.72rem;font-weight:700;}
.days-urgent{color:var(--red2);}
.days-warn{color:var(--orange);}
.days-soon{color:var(--yellow);}
.days-ok{color:var(--green);}
.days-paid{color:var(--ink3);}

.cc-body{padding:0 16px 10px;}
.cc-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);}
.cc-row:last-child{border-bottom:none;}
.cc-rlabel{font-size:.68rem;color:var(--ink3);}
.cc-rval{font-family:'DM Serif Display',serif;font-size:.92rem;}
.cc-rval.red{color:var(--red2);}
.cc-rval.green{color:var(--green);}
.cc-rval.orange{color:var(--orange);}

/* PROGRESS BAR */
.usage-bar{margin:8px 16px 4px;}
.usage-label{display:flex;justify-content:space-between;font-size:.62rem;color:var(--ink3);margin-bottom:5px;}
.bar-track{height:6px;background:var(--bg3);border-radius:99px;overflow:hidden;}
.bar-fill{height:100%;border-radius:99px;transition:width .4s;}
.bar-fill.low{background:var(--green);}
.bar-fill.mid{background:var(--yellow);}
.bar-fill.high{background:var(--orange);}
.bar-fill.over{background:var(--red);}

.cc-actions{display:flex;border-top:1px solid var(--border);}
.cc-btn{flex:1;padding:9px;font-family:inherit;font-size:.66rem;font-weight:700;color:var(--ink3);background:transparent;border:none;border-right:1px solid var(--border);cursor:pointer;transition:all .15s;}
.cc-btn:last-child{border-right:none;}
.cc-btn:hover{color:var(--ink);background:var(--bg3);}
.cc-btn.pay{color:var(--green);}
.cc-btn.del:hover{color:var(--red);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 14px;border-radius:var(--r2);border:1px solid transparent;cursor:pointer;font-family:inherit;font-size:.76rem;font-weight:700;transition:all .18s;}
.btn-primary{background:linear-gradient(135deg,#4a9eff,#a78bfa);color:#fff;border:none;}
.btn-ghost{background:var(--surface);border-color:var(--border);color:var(--ink2);}
.btn-sm{padding:7px 11px;font-size:.7rem;}
.btn-danger{background:var(--red-bg);border-color:rgba(232,69,69,.3);color:var(--red2);}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(8,14,22,.8);backdrop-filter:blur(12px);z-index:500;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
.overlay.on{opacity:1;pointer-events:all;}
@media(min-width:600px){.overlay{align-items:center;padding:20px;}}
.modal{background:var(--bg2);border-radius:18px 18px 0 0;width:100%;max-width:580px;max-height:93dvh;overflow-y:auto;box-shadow:0 -4px 40px rgba(0,0,0,.5);transform:translateY(20px);transition:transform .28s cubic-bezier(.34,1.56,.64,1);border:1px solid var(--border);}
.overlay.on .modal{transform:translateY(0);}
@media(min-width:600px){.modal{border-radius:18px;max-height:90dvh;}}
.modal-drag{width:34px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0;}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:5;}
.modal-title{font-family:'DM Serif Display',serif;font-size:1rem;}
.modal-x{width:28px;height:28px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--ink3);cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;}
.modal-x:hover{border-color:var(--red);color:var(--red);}
.modal-body{padding:18px;}

.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.fl{font-size:.65rem;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;}
.fi,.fs{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:10px 12px;font-family:inherit;font-size:.85rem;color:var(--ink);outline:none;width:100%;transition:border-color .2s;}
.fi:focus,.fs:focus{border-color:var(--blue);}
.fi::placeholder{color:var(--ink4);}
.fh{font-size:.62rem;color:var(--ink3);margin-top:3px;}
.fsec{font-size:.7rem;font-weight:900;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;margin:16px 0 10px;display:flex;align-items:center;gap:7px;}
.fsec::after{content:'';flex:1;height:1px;background:var(--border);}

/* SETTINGS */
.set-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:14px;overflow:hidden;}
.set-row{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border);gap:12px;}
.set-row:last-child{border-bottom:none;}
.set-label{flex:1;font-size:.84rem;font-weight:500;}
.set-sub{font-size:.65rem;color:var(--ink3);margin-top:2px;}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--ink3);}
.empty-ico{font-size:3rem;margin-bottom:12px;opacity:.4;}

/* HISTORY */
.hist-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;padding:14px 16px;}
.hist-item:hover{border-color:var(--border2);}
.hist-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.hist-name{font-weight:700;font-size:.9rem;}
.hist-month{font-size:.7rem;color:var(--ink3);margin-top:2px;}
.hist-amount{font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--green);text-align:right;}
.hist-date{font-size:.62rem;color:var(--ink3);text-align:right;margin-top:2px;}
.hist-detail{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
.hist-tag{font-size:.65rem;color:var(--ink3);background:var(--bg3);border-radius:6px;padding:3px 8px;}
.hist-filter{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.hist-filter select{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:7px 10px;font-family:inherit;font-size:.76rem;color:var(--ink);outline:none;}

/* CONFIRM MODAL */
.confirm-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:24px 20px;width:90%;max-width:340px;text-align:center;}
.confirm-msg{font-size:.9rem;color:var(--ink);margin-bottom:20px;line-height:1.6;}
.confirm-btns{display:flex;gap:10px;justify-content:center;}

/* TOAST */
.toast{position:fixed;bottom:calc(20px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(60px);background:var(--bg3);border:1px solid var(--border);color:var(--ink);border-radius:10px;padding:10px 18px;font-size:.76rem;font-weight:700;z-index:999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.toast.ok{border-color:var(--green);color:var(--green);}
.toast.err{border-color:var(--red);color:var(--red2);}
.toast.warn{border-color:var(--orange);color:var(--orange);}
</style>
</head>
<body>

<header>
  <div class="hd-top">
    <div class="logo">
      <div class="logo-ico">💳</div>
      <div>
        <h1>信用卡管理</h1>
        <p>繳款提醒 · 額度管理</p>
      </div>
    </div>
    <div class="hd-btns">
      <button class="btn btn-ghost btn-sm" onclick="syncNow()" id="syncBtn">🔄 同步</button>
      <button class="btn btn-ghost btn-sm" onclick="openSettings()">⚙️</button>
      <button class="btn btn-primary btn-sm" onclick="openAdd()">＋ 新增</button>
    </div>
  </div>
  <div class="alert-bar" id="alertBar"></div>
  <div class="tabs">
    <button class="tab on" onclick="switchTab('home',this)">💳 信用卡<span class="tab-badge hidden" id="urgentBadge"></span></button>
    <button class="tab" onclick="switchTab('history',this)">📋 繳款紀錄</button>
  </div>
</header>

<!-- HOME -->
<div id="page-home" class="page on">
  <div class="wrap">
    <div class="sum-grid">
      <div class="sum-card"><div class="sum-val" id="sumCards" style="color:var(--blue)">0</div><div class="sum-label">💳 卡片數</div></div>
      <div class="sum-card"><div class="sum-val" id="sumDue" style="color:var(--red2)">0</div><div class="sum-label">⚠️ 7天內到期</div></div>
      <div class="sum-card"><div class="sum-val" id="sumPayable" style="color:var(--orange)">—</div><div class="sum-label">💰 本月應繳</div></div>
      <div class="sum-card"><div class="sum-val" id="sumLimit" style="color:var(--green)">—</div><div class="sum-label">✅ 總剩餘額度</div></div>
    </div>
    <div id="cardList"></div>
  </div>
</div>

<!-- (settings 已整合進 Modal) -->

<!-- HISTORY PAGE -->
<div id="page-history" class="page">
  <div class="wrap" style="max-width:700px">
    <div class="hist-filter">
      <select id="filterCard" onchange="renderHistory()">
        <option value="">所有信用卡</option>
      </select>
      <select id="filterYear" onchange="renderHistory()">
        <option value="">所有年份</option>
      </select>
    </div>
    <div id="histSummary" style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap"></div>
    <div id="histList"></div>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="overlay" id="addOverlay">
  <div class="modal">
    <div class="modal-drag"></div>
    <div class="modal-head">
      <div class="modal-title" id="modalTitle">＋ 新增信用卡</div>
      <button class="modal-x" onclick="closeAdd()">✕</button>
    </div>
    <div class="modal-body">
      <div class="fg2">
        <div class="fg" style="margin-bottom:0">
          <label class="fl">發卡銀行 *</label>
          <input class="fi" id="fBank" placeholder="例：國泰世華">
        </div>
        <div class="fg" style="margin-bottom:0">
          <label class="fl">卡片名稱</label>
          <input class="fi" id="fName" placeholder="例：CUBE卡">
        </div>
      </div>

      <div class="fsec">💰 額度設定</div>
      <div class="fg2">
        <div class="fg" style="margin-bottom:0">
          <label class="fl">信用額度上限（NT$）</label>
          <input class="fi" type="number" id="fLimit" placeholder="0" min="0">
        </div>
        <div class="fg" style="margin-bottom:0">
          <label class="fl">本期已刷金額（NT$）</label>
          <input class="fi" type="number" id="fUsed" placeholder="0" min="0" oninput="updateRemainingPreview()">
          <div class="fh" id="remainingPreview"></div>
        </div>
      </div>

      <div class="fsec">📅 繳款設定</div>
      <div class="fg2">
        <div class="fg" style="margin-bottom:0">
          <label class="fl">帳單截止日（每月幾號）</label>
          <input class="fi" type="number" id="fBillingDay" placeholder="例：25" min="1" max="31">
        </div>
        <div class="fg" style="margin-bottom:0">
          <label class="fl">繳款截止日（每月幾號）</label>
          <input class="fi" type="number" id="fDueDay" placeholder="例：15" min="1" max="31">
          <div class="fh">下個月幾號要繳款</div>
        </div>
      </div>
      <div class="fg2">
        <div class="fg" style="margin-bottom:0">
          <label class="fl">本期應繳總額（NT$）</label>
          <input class="fi" type="number" id="fPayable" placeholder="0" min="0">
        </div>
        <div class="fg" style="margin-bottom:0">
          <label class="fl">最低應繳金額（NT$）</label>
          <input class="fi" type="number" id="fMinPayable" placeholder="0" min="0">
        </div>
      </div>

      <div class="fg" style="margin-top:4px">
        <label class="fl">備註</label>
        <input class="fi" id="fNote" placeholder="例：自動扣款、末五碼…">
      </div>

      <div style="display:flex;gap:8px;margin-top:16px">
        <button class="btn btn-ghost" style="flex:1" onclick="closeAdd()">取消</button>
        <button class="btn btn-primary" style="flex:2;justify-content:center" onclick="saveCard()">💾 儲存</button>
      </div>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="overlay" id="gsOverlay">
  <div class="modal">
    <div class="modal-drag"></div>
    <div class="modal-head">
      <div class="modal-title">⚙️ 設定</div>
      <button class="modal-x" onclick="closeGS()">✕</button>
    </div>
    <div class="modal-body">

      <div class="fsec">Google Sheets 連線</div>
      <div style="background:var(--blue-bg);border:1px solid rgba(74,158,255,.2);border-radius:var(--r2);padding:12px;font-size:.74rem;color:var(--ink2);line-height:1.65;margin-bottom:14px">
        ① Apps Script 部署後複製網址貼到下方<br>
        ② 儲存後點「同步」即可讀取雲端資料
      </div>
      <div class="fg">
        <label class="fl">Apps Script 網址</label>
        <input class="fi" id="gsApi" placeholder="https://script.google.com/macros/s/…/exec">
        <div class="fh" id="gsStatus2">尚未設定</div>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:20px">
        <button class="btn btn-primary" style="flex:2;justify-content:center" onclick="saveGS()">💾 儲存並同步</button>
        <button class="btn btn-ghost" style="flex:1;justify-content:center" onclick="clearGsApi()">清除網址</button>
      </div>

      <div class="fsec">資料管理</div>
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <button class="btn btn-ghost" style="flex:1;justify-content:center" onclick="syncNow()">🔄 立即同步</button>
        <button class="btn btn-danger" style="flex:1;justify-content:center" onclick="clearAll()">🗑 清除本機資料</button>
      </div>

      <div class="fsec">欄位格式說明</div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:12px;font-size:.72rem;color:var(--ink2);line-height:1.8">
        工作表名稱：<code style="background:var(--bg3);padding:1px 5px;border-radius:4px">cards</code><br>
        欄位：id · bank · name · limit · used · billingDay · dueDay · payable · minPayable · note · paid
      </div>

      <div style="text-align:center;font-size:.62rem;color:var(--ink4);margin-top:16px">信用卡管理 v1.1 · PWA</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- CONFIRM MODAL -->
<div class="overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-msg" id="confirmMsg"></div>
    <div class="confirm-btns">
      <button class="btn btn-ghost" style="flex:1;justify-content:center" onclick="confirmResolve(false)">取消</button>
      <button class="btn btn-danger" style="flex:1;justify-content:center" onclick="confirmResolve(true)">確定刪除</button>
    </div>
  </div>
</div>

<script>
'use strict';

let cards  = [];
let history = [];
let gsApi  = '';
let editId = null;

// ── 初始化 ──
(function(){
  try{ cards   = JSON.parse(localStorage.getItem('cc_cards')||'[]'); }catch(e){}
  try{ history = JSON.parse(localStorage.getItem('cc_history')||'[]'); }catch(e){}
  try{ gsApi   = localStorage.getItem('cc_api')||''; }catch(e){}
  if(gsApi) document.getElementById('gsApi').value = gsApi;
  renderAll();
})();

function save(){
  localStorage.setItem('cc_cards', JSON.stringify(cards));
}
function saveHistory(){
  localStorage.setItem('cc_history', JSON.stringify(history));
}

// ── 工具函式 ──
function today(){ const d=new Date(); return d; }
function fmtMoney(n){ return n>0?'NT$'+Number(n).toLocaleString():'—'; }

function getNextDueDate(dueDay){
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  let due = new Date(year, month, dueDay);
  if(due <= now) due = new Date(year, month+1, dueDay);
  return due;
}

function daysUntilDue(dueDay){
  const now = new Date(); now.setHours(0,0,0,0);
  const due = getNextDueDate(dueDay); due.setHours(0,0,0,0);
  return Math.round((due-now)/(1000*60*60*24));
}

function fmtDueDate(dueDay){
  const d = getNextDueDate(dueDay);
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function getStatus(card){
  if(card.paid) return 'paid';
  const d = daysUntilDue(card.dueDay);
  if(d<=0)  return 'urgent';
  if(d<=3)  return 'warn';
  if(d<=7)  return 'soon';
  return 'ok';
}

function getDaysLabel(card){
  if(card.paid) return '✓ 本期已繳';
  const d = daysUntilDue(card.dueDay);
  if(d<=0)  return `逾期 ${Math.abs(d)} 天！`;
  if(d===1) return '明天截止！';
  return `還剩 ${d} 天`;
}

function getDaysClass(card){
  const s = getStatus(card);
  return {urgent:'days-urgent',warn:'days-warn',soon:'days-soon',ok:'days-ok',paid:'days-paid'}[s];
}

function getUsagePct(card){
  if(!card.limit||card.limit<=0) return 0;
  return Math.min(100, Math.round((card.used/card.limit)*100));
}

function getBarClass(pct){
  if(pct>=90) return 'over';
  if(pct>=70) return 'high';
  if(pct>=40) return 'mid';
  return 'low';
}

// ── TABS ──
function switchTab(tab, el){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.getElementById('page-'+tab).classList.add('on');
}

// ── RENDER ──
function renderAll(){
  renderSummary();
  renderList();
  renderHistory();
  checkAlerts();
  updateGsStatus();
}

function renderSummary(){
  const active = cards.filter(c=>!c.paid);
  const due7   = active.filter(c=>daysUntilDue(c.dueDay)<=7).length;
  const totalPayable = active.reduce((s,c)=>s+(Number(c.payable)||0),0);
  const totalRemain  = active.reduce((s,c)=>s+(Math.max(0,(Number(c.limit)||0)-(Number(c.used)||0))),0);

  document.getElementById('sumCards').textContent  = cards.length;
  document.getElementById('sumDue').textContent    = due7;
  document.getElementById('sumPayable').textContent = totalPayable>0?'NT$'+totalPayable.toLocaleString():'—';
  document.getElementById('sumLimit').textContent   = totalRemain>0?'NT$'+totalRemain.toLocaleString():'—';

  const urgentCount = active.filter(c=>daysUntilDue(c.dueDay)<=3).length;
  const badge = document.getElementById('urgentBadge');
  if(urgentCount>0){ badge.textContent=urgentCount; badge.classList.remove('hidden'); }
  else badge.classList.add('hidden');
}

function renderList(){
  const el = document.getElementById('cardList');
  if(!cards.length){
    el.innerHTML=`<div class="empty"><div class="empty-ico">💳</div><p>還沒有信用卡<br>點「＋ 新增」加入！</p></div>`;
    return;
  }
  const sorted = [...cards].sort((a,b)=>{
    if(a.paid&&!b.paid) return 1;
    if(!a.paid&&b.paid) return -1;
    return daysUntilDue(a.dueDay)-daysUntilDue(b.dueDay);
  });
  el.innerHTML = sorted.map(cardHtml).join('');
}

function cardHtml(c){
  const status  = getStatus(c);
  const dLabel  = getDaysLabel(c);
  const dClass  = getDaysClass(c);
  const pct     = getUsagePct(c);
  const barClass= getBarClass(pct);
  const remain  = Math.max(0,(Number(c.limit)||0)-(Number(c.used)||0));

  return `<div class="cc-card ${status}">
    <div class="cc-header">
      <div class="cc-icon">💳</div>
      <div class="cc-info">
        <div class="cc-name">${c.bank}${c.name?' · '+c.name:''}</div>
        <div class="cc-bank">繳款日每月 ${c.dueDay} 號${c.note?' · '+c.note:''}</div>
      </div>
      <div class="cc-right">
        <div class="cc-due">📅 ${fmtDueDate(c.dueDay)} 截止</div>
        <div class="cc-days ${dClass}">${dLabel}</div>
      </div>
    </div>
    ${c.limit>0?`<div class="usage-bar">
      <div class="usage-label">
        <span>已使用 ${pct}%（${fmtMoney(c.used)}）</span>
        <span>剩餘 ${fmtMoney(remain)}</span>
      </div>
      <div class="bar-track"><div class="bar-fill ${barClass}" style="width:${pct}%"></div></div>
    </div>`:''}
    <div class="cc-body">
      <div class="cc-row">
        <span class="cc-rlabel">💰 本期應繳總額</span>
        <span class="cc-rval ${c.payable>0?'orange':''}">${fmtMoney(c.payable)}</span>
      </div>
      <div class="cc-row">
        <span class="cc-rlabel">⚠️ 最低應繳金額</span>
        <span class="cc-rval">${fmtMoney(c.minPayable)}</span>
      </div>
      ${c.limit>0?`<div class="cc-row">
        <span class="cc-rlabel">✅ 剩餘可用額度</span>
        <span class="cc-rval ${remain<5000?'red':'green'}">${fmtMoney(remain)}</span>
      </div>`:''}
    </div>
    <div class="cc-actions">
      <button class="cc-btn pay" onclick="togglePaid('${c.id}')">${c.paid?'↩ 取消':'✓ 已繳款'}</button>
      <button class="cc-btn" onclick="openEdit('${c.id}')">✏️ 編輯</button>
      <button class="cc-btn del" onclick="delCard('${c.id}')">🗑 刪除</button>
    </div>
  </div>`;
}

function renderHistory(){
  // 更新篩選器選項
  const cardSel = document.getElementById('filterCard');
  const yearSel = document.getElementById('filterYear');
  const selCard = cardSel.value;
  const selYear = yearSel.value;

  // 卡片選項
  const cardNames = [...new Set(history.map(h=>h.cardKey))];
  cardSel.innerHTML = '<option value="">所有信用卡</option>' +
    cardNames.map(k=>`<option value="${k}" ${k===selCard?'selected':''}>${k}</option>`).join('');

  // 年份選項
  const years = [...new Set(history.map(h=>h.paidAt?.slice(0,4)).filter(Boolean))].sort().reverse();
  yearSel.innerHTML = '<option value="">所有年份</option>' +
    years.map(y=>`<option value="${y}" ${y===selYear?'selected':''}>${y} 年</option>`).join('');

  // 篩選
  let list = [...history].sort((a,b)=>new Date(b.paidAt)-new Date(a.paidAt));
  if(selCard) list = list.filter(h=>h.cardKey===selCard);
  if(selYear) list = list.filter(h=>h.paidAt?.startsWith(selYear));

  // 統計
  const totalPaid = list.reduce((s,h)=>s+(Number(h.payable)||0),0);
  const summaryEl = document.getElementById('histSummary');
  summaryEl.innerHTML = `
    <div class="sum-card" style="flex:1;min-width:120px">
      <div class="sum-val" style="color:var(--blue);font-size:1.2rem">${list.length}</div>
      <div class="sum-label">繳款筆數</div>
    </div>
    <div class="sum-card" style="flex:2;min-width:160px">
      <div class="sum-val" style="color:var(--green);font-size:1.2rem">${totalPaid>0?'NT$'+totalPaid.toLocaleString():'—'}</div>
      <div class="sum-label">合計繳款金額</div>
    </div>`;

  // 列表
  const el = document.getElementById('histList');
  if(!list.length){
    el.innerHTML=`<div class="empty"><div class="empty-ico">📋</div><p>還沒有繳款紀錄<br>點「✓ 已繳款」會自動記錄！</p></div>`;
    return;
  }

  el.innerHTML = list.map(h=>{
    const dt = h.paidAt ? new Date(h.paidAt) : null;
    const dtStr = dt ? `${dt.getFullYear()}/${dt.getMonth()+1}/${dt.getDate()} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}` : '—';
    return `<div class="hist-item">
      <div class="hist-top">
        <div>
          <div class="hist-name">${h.cardKey}</div>
          <div class="hist-month">${h.billingMonth || '—'} 帳單</div>
        </div>
        <div>
          <div class="hist-amount">${h.payable>0?'NT$'+Number(h.payable).toLocaleString():'—'}</div>
          <div class="hist-date">繳款時間：${dtStr}</div>
        </div>
      </div>
      <div class="hist-detail">
        ${h.minPayable>0?`<span class="hist-tag">最低應繳 NT$${Number(h.minPayable).toLocaleString()}</span>`:''}
        ${h.limit>0?`<span class="hist-tag">額度 NT$${Number(h.limit).toLocaleString()}</span>`:''}
        ${h.used>0?`<span class="hist-tag">已刷 NT$${Number(h.used).toLocaleString()}</span>`:''}
        ${h.note?`<span class="hist-tag">備註：${h.note}</span>`:''}
      </div>
    </div>`;
  }).join('');
}

function checkAlerts(){
  const urgent = cards.filter(c=>!c.paid&&daysUntilDue(c.dueDay)<=3);
  const bar = document.getElementById('alertBar');
  if(urgent.length){
    bar.textContent = `🚨 ${urgent.map(c=>c.bank+(c.name?' '+c.name:'')).join('、')} 等 ${urgent.length} 張卡即將到期！`;
    bar.classList.add('show');
  } else {
    bar.classList.remove('show');
  }
}

// ── ACTIONS ──
function togglePaid(id){
  const c = cards.find(x=>x.id===id);
  if(!c) return;
  c.paid = !c.paid;

  // 標記已繳時，自動存一筆歷史紀錄
  if(c.paid){
    const now = new Date();
    const billingMonth = `${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}`;
    const rec = {
      id:           'h'+Date.now(),
      cardId:       c.id,
      cardKey:      c.bank + (c.name?' · '+c.name:''),
      billingMonth,
      payable:      c.payable,
      minPayable:   c.minPayable,
      limit:        c.limit,
      used:         c.used,
      note:         c.note,
      paidAt:       now.toISOString(),
    };
    history.unshift(rec);
    saveHistory();
  }

  save(); renderAll();
  toast(c.paid?'✓ 已標記為已繳款，紀錄已儲存':'已取消繳款標記','ok');
  if(gsApi) pushCard(c);
}

// ── 自訂確認框 ──
let _confirmResolve = null;
function confirmResolve(val){
  document.getElementById('confirmOverlay').classList.remove('on');
  if(_confirmResolve) _confirmResolve(val);
  _confirmResolve = null;
}
function myConfirm(msg){
  document.getElementById('confirmMsg').textContent = msg;
  document.getElementById('confirmOverlay').classList.add('on');
  return new Promise(res => _confirmResolve = res);
}

async function delCard(id){
  const c = cards.find(x=>x.id===id);
  const ok = await myConfirm(`確定刪除「${c?.bank}${c?.name?' '+c.name:''}」？`);
  if(!ok) return;
  cards = cards.filter(x=>x.id!==id);
  save(); renderAll();
  toast('已刪除','err');
  if(gsApi){
    try{
      await fetch(gsApi+'?action=deleteCard&id='+encodeURIComponent(id));
    }catch(e){}
  }
}

// ── ADD/EDIT ──
function updateRemainingPreview(){
  const limit = parseFloat(document.getElementById('fLimit').value)||0;
  const used  = parseFloat(document.getElementById('fUsed').value)||0;
  const el    = document.getElementById('remainingPreview');
  if(limit>0 && used>=0) el.textContent = `剩餘額度：NT$${(limit-used).toLocaleString()}`;
  else el.textContent = '';
}

function openAdd(){
  editId=null;
  document.getElementById('modalTitle').textContent='＋ 新增信用卡';
  ['fBank','fName','fNote'].forEach(id=>document.getElementById(id).value='');
  ['fLimit','fUsed','fBillingDay','fDueDay','fPayable','fMinPayable'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('remainingPreview').textContent='';
  document.getElementById('addOverlay').classList.add('on');
}

function openEdit(id){
  editId=id;
  const c=cards.find(x=>x.id===id);
  if(!c) return;
  document.getElementById('modalTitle').textContent='✏️ 編輯信用卡';
  document.getElementById('fBank').value       = c.bank||'';
  document.getElementById('fName').value       = c.name||'';
  document.getElementById('fLimit').value      = c.limit||'';
  document.getElementById('fUsed').value       = c.used||'';
  document.getElementById('fBillingDay').value = c.billingDay||'';
  document.getElementById('fDueDay').value     = c.dueDay||'';
  document.getElementById('fPayable').value    = c.payable||'';
  document.getElementById('fMinPayable').value = c.minPayable||'';
  document.getElementById('fNote').value       = c.note||'';
  updateRemainingPreview();
  document.getElementById('addOverlay').classList.add('on');
}

function closeAdd(){ document.getElementById('addOverlay').classList.remove('on'); }

function saveCard(){
  const bank   = document.getElementById('fBank').value.trim();
  const dueDay = parseInt(document.getElementById('fDueDay').value);
  if(!bank){ toast('請輸入發卡銀行','err'); return; }
  if(!dueDay){ toast('請輸入繳款截止日','err'); return; }

  const c = {
    id:          editId||'cc'+Date.now(),
    bank,
    name:        document.getElementById('fName').value.trim(),
    limit:       parseFloat(document.getElementById('fLimit').value)||0,
    used:        parseFloat(document.getElementById('fUsed').value)||0,
    billingDay:  parseInt(document.getElementById('fBillingDay').value)||0,
    dueDay,
    payable:     parseFloat(document.getElementById('fPayable').value)||0,
    minPayable:  parseFloat(document.getElementById('fMinPayable').value)||0,
    note:        document.getElementById('fNote').value.trim(),
    paid:        false,
  };

  if(editId){
    const i=cards.findIndex(x=>x.id===editId);
    if(i>=0){ c.paid=cards[i].paid; cards[i]=c; }
  } else {
    cards.push(c);
  }

  save(); closeAdd(); renderAll();
  toast(editId?'已更新 ✓':'已新增 ✓','ok');
  if(gsApi) pushCard(c);
}

// ── GOOGLE SHEETS ──
async function pushCard(c){
  if(!gsApi) return;
  try{
    const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(c))));
    await fetch(gsApi+'?action=saveCard&b64=1&data='+encodeURIComponent(encoded));
  }catch(e){}
}

function openSettings(){
  if(gsApi) document.getElementById('gsApi').value = gsApi;
  updateGsStatus();
  document.getElementById('gsOverlay').classList.add('on');
}
function openGS(){ openSettings(); }
function closeGS(){ document.getElementById('gsOverlay').classList.remove('on'); }

function clearGsApi(){
  if(!confirm('確定清除已儲存的 Apps Script 網址？')) return;
  gsApi='';
  localStorage.removeItem('cc_api');
  document.getElementById('gsApi').value='';
  updateGsStatus();
  toast('已清除網址','warn');
}

function saveGS(){
  gsApi = document.getElementById('gsApi').value.trim();
  localStorage.setItem('cc_api', gsApi);
  closeGS();
  if(gsApi) syncNow();
  else toast('請填入 Apps Script 網址','err');
}

async function syncNow(){
  if(!gsApi){ openGS(); return; }
  const btn = document.getElementById('syncBtn');
  if(btn){ btn.textContent='⏳…'; btn.disabled=true; }
  try{
    const res  = await fetch(gsApi+'?action=getCards&_t='+Date.now());
    const data = await res.json();
    if(data.success && data.cards){
      // 合併：本機新增的保留，Sheets 的更新進來
      const sheetMap = {};
      data.cards.forEach(c=>sheetMap[c.id]=c);
      // 更新已有的
      cards = cards.map(c=> sheetMap[c.id]?{...sheetMap[c.id]}:c);
      // 加入 Sheets 有但本機沒有的
      const localIds = new Set(cards.map(c=>c.id));
      data.cards.forEach(c=>{ if(!localIds.has(c.id)) cards.push(c); });
      save(); renderAll();
      toast(`✓ 同步完成，共 ${cards.length} 張卡`,'ok');
    }
  }catch(e){
    toast('同步失敗：'+e.message,'err');
  }finally{
    const btn2 = document.getElementById('syncBtn');
    if(btn2){ btn2.textContent='🔄 同步'; btn2.disabled=false; }
  }
}

function updateGsStatus(){
  const el  = document.getElementById('gsStatus');
  const el2 = document.getElementById('gsStatus2');
  const txt = gsApi ? '已設定 · 點同步更新' : '未設定';
  const txt2 = gsApi ? '✓ 目前網址：' + gsApi.slice(0,60) + (gsApi.length>60?'…':'') : '尚未設定';
  if(el)  el.textContent  = txt;
  if(el2) el2.textContent = txt2;
}

async function clearAll(){
  const ok = await myConfirm('確定清除所有本機信用卡資料與繳款紀錄？');
  if(!ok) return;
  cards=[]; history=[];
  save(); saveHistory(); renderAll();
  toast('已清除','err');
}

function toast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast show ${type}`;
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2800);
}

['addOverlay','gsOverlay','confirmOverlay'].forEach(id=>{
  const el = document.getElementById(id);
  if(el) el.addEventListener('click',function(e){
    if(e.target===this){ this.classList.remove('on'); if(id==='confirmOverlay') confirmResolve(false); }
  });
});

// ── Service Worker 註冊 ──
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW 已註冊', reg.scope))
      .catch(err => console.log('SW 註冊失敗', err));
  });
}
</script>
