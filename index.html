<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f1923">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="宜寶管家">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>宜寶管家</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ══ THEME VARIABLES ══ */
[data-theme="dark"]{
  --bg:#0f1923;--bg2:#162030;--bg3:#1e2d40;
  --surface:#1a2a3a;--border:#2a3d52;--border2:#3a5068;
  --ink:#e8f0f8;--ink2:#a8c0d8;--ink3:#6888a8;--ink4:#3a5068;
  --card-bg:#1a2a3a;--shadow:0 4px 24px rgba(0,0,0,.35);
}
[data-theme="light"]{
  --bg:#f0f4f8;--bg2:#ffffff;--bg3:#e8eef4;
  --surface:#ffffff;--border:#d0dce8;--border2:#b0c4d8;
  --ink:#1a2a3a;--ink2:#3a5068;--ink3:#7890a8;--ink4:#b0c4d8;
  --card-bg:#ffffff;--shadow:0 4px 24px rgba(0,0,0,.1);
}
:root{
  --red:#e84545;--red2:#ff6b6b;--red-bg:rgba(232,69,69,.12);
  --orange:#f0833a;--orange-bg:rgba(240,131,58,.12);
  --yellow:#f0c040;--yellow-bg:rgba(240,192,64,.12);
  --green:#38c98a;--green-bg:rgba(56,201,138,.12);
  --blue:#4a9eff;--blue-bg:rgba(74,158,255,.12);
  --purple:#a78bfa;--purple-bg:rgba(167,139,250,.12);
  --r:14px;--r2:10px;--nav-h:64px;
}
*{margin:0;padding:0;box-sizing:border-box;transition:background-color .25s,color .25s,border-color .25s;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--ink);min-height:100dvh;-webkit-tap-highlight-color:transparent;padding-bottom:var(--nav-h);}

/* ══ TOP BAR ══ */
.top-bar{position:sticky;top:0;z-index:100;background:var(--bg2);border-bottom:1px solid var(--border);backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:space-between;padding:12px 16px;gap:8px;}
.top-title{font-family:'DM Serif Display',serif;font-size:1.1rem;display:flex;align-items:center;gap:8px;white-space:nowrap;}
.top-actions{display:flex;gap:6px;align-items:center;}
.alert-bar{background:linear-gradient(90deg,rgba(232,69,69,.15),rgba(240,131,58,.08));border-bottom:1px solid rgba(232,69,69,.2);padding:7px 16px;font-size:.73rem;color:var(--red2);display:none;}
.alert-bar.show{display:flex;align-items:center;gap:8px;}

/* ══ BOTTOM NAV ══ */
.bot-nav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--bg2);border-top:1px solid var(--border);display:flex;height:var(--nav-h);padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:transparent;border:none;cursor:pointer;color:var(--ink3);transition:color .2s;position:relative;font-family:inherit;padding:0;}
.nav-btn.on{color:var(--blue);}
.nav-ico{font-size:1.25rem;line-height:1;}
.nav-lbl{font-size:.55rem;font-weight:700;letter-spacing:.03em;}
.nav-dot{position:absolute;top:7px;right:calc(50% - 16px);width:7px;height:7px;border-radius:50%;background:var(--red);display:none;}
.nav-dot.show{display:block;}

/* ══ PAGES ══ */
.page{display:none;animation:fadeIn .18s ease;}
.page.on{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.wrap{max-width:800px;margin:0 auto;padding:16px 14px 20px;}

/* ══ BUTTONS ══ */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 14px;border-radius:var(--r2);border:1px solid transparent;cursor:pointer;font-family:inherit;font-size:.76rem;font-weight:700;transition:all .18s;}
.btn-primary{background:linear-gradient(135deg,#4a9eff,#a78bfa);color:#fff;border:none;}
.btn-ghost{background:var(--surface);border-color:var(--border);color:var(--ink2);}
.btn-sm{padding:6px 11px;font-size:.7rem;}
.btn-danger{background:var(--red-bg);border-color:rgba(232,69,69,.3);color:var(--red2);}
.btn-green{background:var(--green-bg);border-color:rgba(56,201,138,.3);color:var(--green);}
.icon-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--ink2);cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.icon-btn:hover{border-color:var(--blue);color:var(--blue);}

/* ══ SUMMARY GRID ══ */
.sum-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px;}
@media(min-width:560px){.sum-grid{grid-template-columns:repeat(4,1fr);}}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px;text-align:center;}
.sum-val{font-family:'DM Serif Display',serif;font-size:1.45rem;margin-bottom:2px;}
.sum-label{font-size:.58rem;color:var(--ink3);text-transform:uppercase;letter-spacing:.07em;}

/* ══ SECTION TITLE ══ */
.sec-title{font-size:.68rem;font-weight:900;color:var(--ink3);text-transform:uppercase;letter-spacing:.1em;margin:16px 0 10px;display:flex;align-items:center;gap:8px;}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* ══ CREDIT CARDS ══ */
.cc-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:11px;overflow:hidden;transition:border-color .2s,box-shadow .2s;}
.cc-card:hover{border-color:var(--border2);box-shadow:var(--shadow);}
.cc-card.urgent{border-left:4px solid var(--red);}
.cc-card.warn{border-left:4px solid var(--orange);}
.cc-card.soon{border-left:4px solid var(--yellow);}
.cc-card.ok{border-left:4px solid var(--green);}
.cc-card.paid{opacity:.5;}
.cc-header{padding:13px 15px 9px;display:flex;align-items:flex-start;gap:11px;}
.cc-icon{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;}
.cc-info{flex:1;min-width:0;}
.cc-name{font-weight:700;font-size:.92rem;margin-bottom:2px;}
.cc-sub{font-size:.66rem;color:var(--ink3);}
.cc-right{text-align:right;flex-shrink:0;}
.cc-due{font-size:.68rem;color:var(--ink3);margin-bottom:2px;}
.cc-days{font-size:.7rem;font-weight:700;}
.days-urgent{color:var(--red2);}
.days-warn{color:var(--orange);}
.days-soon{color:var(--yellow);}
.days-ok{color:var(--green);}
.days-paid{color:var(--ink3);}
.cc-body{padding:0 15px 9px;}
.cc-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);}
.cc-row:last-child{border-bottom:none;}
.cc-rlabel{font-size:.67rem;color:var(--ink3);}
.cc-rval{font-family:'DM Serif Display',serif;font-size:.9rem;}
.cc-rval.red{color:var(--red2);}
.cc-rval.green{color:var(--green);}
.cc-rval.orange{color:var(--orange);}
.usage-bar{margin:7px 15px 3px;}
.usage-label{display:flex;justify-content:space-between;font-size:.6rem;color:var(--ink3);margin-bottom:4px;}
.bar-track{height:5px;background:var(--bg3);border-radius:99px;overflow:hidden;}
.bar-fill{height:100%;border-radius:99px;transition:width .4s;}
.bar-fill.low{background:var(--green);}
.bar-fill.mid{background:var(--yellow);}
.bar-fill.high{background:var(--orange);}
.bar-fill.over{background:var(--red);}
.cc-actions{display:flex;border-top:1px solid var(--border);}
.cc-btn{flex:1;padding:9px;font-family:inherit;font-size:.64rem;font-weight:700;color:var(--ink3);background:transparent;border:none;border-right:1px solid var(--border);cursor:pointer;transition:all .15s;}
.cc-btn:last-child{border-right:none;}
.cc-btn:hover{color:var(--ink);background:var(--bg3);}
.cc-btn.pay{color:var(--green);}
.cc-btn.del:hover{color:var(--red);}

/* ══ TODO ══ */
.todo-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.todo-tab{padding:5px 12px;border-radius:99px;font-size:.7rem;font-weight:700;border:1px solid var(--border);background:var(--surface);color:var(--ink3);cursor:pointer;transition:all .15s;}
.todo-tab.on{background:var(--blue);border-color:var(--blue);color:#fff;}
.todo-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;transition:all .2s;}
.todo-item.done{opacity:.5;}
.todo-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.todo-check.checked{background:var(--green);border-color:var(--green);}
.todo-check.checked::after{content:'✓';color:#fff;font-size:.7rem;font-weight:900;}
.todo-content{flex:1;min-width:0;}
.todo-title{font-size:.85rem;font-weight:600;}
.todo-title.done-text{text-decoration:line-through;color:var(--ink3);}
.todo-meta{font-size:.62rem;color:var(--ink3);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap;}
.todo-pri{font-size:.6rem;font-weight:700;padding:1px 7px;border-radius:99px;}
.pri-high{background:var(--red-bg);color:var(--red2);}
.pri-mid{background:var(--yellow-bg);color:var(--yellow);}
.pri-low{background:var(--green-bg);color:var(--green);}
.todo-del{color:var(--ink3);background:transparent;border:none;cursor:pointer;font-size:.85rem;padding:4px;border-radius:6px;transition:color .15s;}
.todo-del:hover{color:var(--red);}

/* ══ LEDGER ══ */
.ledger-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.ledger-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px;text-align:center;}
.ledger-val{font-family:'DM Serif Display',serif;font-size:1.2rem;margin-bottom:2px;}
.ledger-label{font-size:.58rem;color:var(--ink3);text-transform:uppercase;}
.budget-bar-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:14px;}
.budget-info{display:flex;justify-content:space-between;font-size:.75rem;margin-bottom:8px;}
.budget-pct{font-weight:700;}
.txn-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:11px 14px;margin-bottom:7px;display:flex;align-items:center;gap:10px;}
.txn-cat{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
.txn-cat.income{background:var(--green-bg);}
.txn-cat.expense{background:var(--red-bg);}
.txn-info{flex:1;min-width:0;}
.txn-desc{font-size:.83rem;font-weight:600;}
.txn-meta{font-size:.62rem;color:var(--ink3);margin-top:2px;}
.txn-amount{font-family:'DM Serif Display',serif;font-size:1rem;font-weight:700;}
.txn-amount.income{color:var(--green);}
.txn-amount.expense{color:var(--red2);}
.txn-del{color:var(--ink3);background:transparent;border:none;cursor:pointer;font-size:.85rem;padding:4px;border-radius:6px;transition:color .15s;}
.txn-del:hover{color:var(--red);}
.ledger-filter{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.ledger-filter select{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:7px 10px;font-family:inherit;font-size:.74rem;color:var(--ink);outline:none;flex:1;}

/* ══ SHOPPING ══ */
.shop-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:11px 14px;margin-bottom:7px;display:flex;align-items:center;gap:10px;}
.shop-item.bought{opacity:.45;}
.shop-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.shop-check.checked{background:var(--green);border-color:var(--green);}
.shop-check.checked::after{content:'✓';color:#fff;font-size:.65rem;font-weight:900;}
.shop-info{flex:1;}
.shop-name{font-size:.84rem;font-weight:600;}
.shop-name.done-text{text-decoration:line-through;color:var(--ink3);}
.shop-meta{font-size:.62rem;color:var(--ink3);margin-top:2px;}
.shop-del{color:var(--ink3);background:transparent;border:none;cursor:pointer;font-size:.85rem;padding:4px;border-radius:6px;transition:color .15s;}
.shop-del:hover{color:var(--red);}
.shop-actions{display:flex;gap:8px;margin-bottom:12px;}

/* ══ CALENDAR ══ */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-month{font-family:'DM Serif Display',serif;font-size:1.15rem;}
.cal-arrow{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink2);font-size:.95rem;transition:all .15s;}
.cal-arrow:hover{border-color:var(--blue);color:var(--blue);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:14px;}
.cal-dow{text-align:center;font-size:.58rem;font-weight:700;color:var(--ink3);padding:4px 0;}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:9px;position:relative;gap:2px;cursor:default;}
.cal-day.other-month{opacity:.2;}
.cal-day.today{background:var(--blue-bg);border:1px solid rgba(74,158,255,.3);}
.cal-day-num{font-size:.75rem;font-weight:600;line-height:1;}
.cal-dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;max-width:26px;}
.cal-dot{width:4px;height:4px;border-radius:50%;}
.cal-dot.cc{background:var(--blue);}
.cal-dot.todo{background:var(--purple);}
.cal-event-list{margin-top:4px;}
.cal-ev{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:10px 13px;margin-bottom:7px;display:flex;align-items:center;gap:11px;}
.cal-ev-day{font-family:'DM Serif Display',serif;font-size:1.5rem;color:var(--blue);min-width:32px;text-align:center;line-height:1;}
.cal-ev-info{flex:1;}
.cal-ev-name{font-size:.83rem;font-weight:700;}
.cal-ev-sub{font-size:.66rem;color:var(--ink3);margin-top:2px;}
.cal-ev-tag{font-size:.62rem;font-weight:700;padding:2px 8px;border-radius:99px;}
.tag-cc{background:var(--blue-bg);color:var(--blue);}
.tag-todo{background:var(--purple-bg);color:var(--purple);}
.tag-urgent{background:var(--red-bg);color:var(--red2);}
.tag-paid{background:var(--bg3);color:var(--ink3);}

/* ══ HISTORY ══ */
.hist-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:9px;padding:13px 15px;}
.hist-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px;}
.hist-name{font-weight:700;font-size:.88rem;}
.hist-month{font-size:.67rem;color:var(--ink3);margin-top:2px;}
.hist-amount{font-family:'DM Serif Display',serif;font-size:1.05rem;color:var(--green);text-align:right;}
.hist-date{font-size:.6rem;color:var(--ink3);text-align:right;margin-top:2px;}
.hist-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px;padding-top:7px;border-top:1px solid var(--border);}
.hist-tag{font-size:.63rem;color:var(--ink3);background:var(--bg3);border-radius:5px;padding:2px 7px;}
.sel-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.sel-row select{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:7px 10px;font-family:inherit;font-size:.74rem;color:var(--ink);outline:none;flex:1;}

/* ══ SETTINGS ══ */
.set-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden;}
.set-row{display:flex;align-items:center;padding:13px 15px;border-bottom:1px solid var(--border);gap:11px;}
.set-row:last-child{border-bottom:none;}
.set-ico{font-size:1.05rem;width:22px;text-align:center;}
.set-label{flex:1;}
.set-label strong{font-size:.82rem;display:block;}
.set-label span{font-size:.63rem;color:var(--ink3);}

/* ══ MODAL ══ */
.overlay{position:fixed;inset:0;background:rgba(8,14,22,.85);backdrop-filter:blur(12px);z-index:500;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .22s;}
.overlay.on{opacity:1;pointer-events:all;}
@media(min-width:580px){.overlay{align-items:center;padding:18px;}}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:560px;max-height:93dvh;overflow-y:auto;box-shadow:0 -4px 40px rgba(0,0,0,.4);transform:translateY(16px);transition:transform .26s cubic-bezier(.34,1.56,.64,1);border:1px solid var(--border);}
.overlay.on .modal{transform:translateY(0);}
@media(min-width:580px){.modal{border-radius:20px;max-height:90dvh;}}
.modal-drag{width:34px;height:4px;background:var(--border);border-radius:2px;margin:11px auto 0;}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:13px 17px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:5;}
.modal-title{font-family:'DM Serif Display',serif;font-size:.98rem;}
.modal-x{width:26px;height:26px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--ink3);cursor:pointer;font-size:.8rem;display:flex;align-items:center;justify-content:center;}
.modal-x:hover{border-color:var(--red);color:var(--red);}
.modal-body{padding:16px;}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:11px;}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px;}
.fl{font-size:.63rem;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;}
.fi,.fs{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r2);padding:9px 11px;font-family:inherit;font-size:.83rem;color:var(--ink);outline:none;width:100%;transition:border-color .18s;}
.fi:focus,.fs:focus{border-color:var(--blue);}
.fi::placeholder{color:var(--ink4);}
.fh{font-size:.6rem;color:var(--ink3);margin-top:2px;}
.fsec{font-size:.67rem;font-weight:900;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;margin:14px 0 9px;display:flex;align-items:center;gap:6px;}
.fsec::after{content:'';flex:1;height:1px;background:var(--border);}
.radio-group{display:flex;gap:6px;flex-wrap:wrap;}
.radio-opt{padding:5px 12px;border-radius:99px;font-size:.7rem;font-weight:700;border:1px solid var(--border);background:var(--bg3);color:var(--ink3);cursor:pointer;transition:all .15s;}
.radio-opt.on{border-color:var(--blue);background:var(--blue-bg);color:var(--blue);}

/* ══ CONFIRM ══ */
.confirm-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:26px 20px;width:90%;max-width:320px;text-align:center;}
.confirm-msg{font-size:.88rem;color:var(--ink);margin-bottom:18px;line-height:1.7;}
.confirm-btns{display:flex;gap:9px;}

/* ══ EMPTY ══ */
.empty{text-align:center;padding:60px 20px;color:var(--ink3);}
.empty-ico{font-size:3rem;margin-bottom:12px;opacity:.3;}
.empty p{font-size:.82rem;line-height:1.8;}

/* ══ TOAST ══ */
.toast{position:fixed;bottom:calc(var(--nav-h) + 10px);left:50%;transform:translateX(-50%) translateY(36px);background:var(--bg3);border:1px solid var(--border);color:var(--ink);border-radius:10px;padding:9px 17px;font-size:.74rem;font-weight:700;z-index:999;opacity:0;transition:all .28s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.toast.ok{border-color:var(--green);color:var(--green);}
.toast.err{border-color:var(--red);color:var(--red2);}
.toast.warn{border-color:var(--orange);color:var(--orange);}

/* ══ FAB ══ */

<script>
'use strict';

// ── 資料 ──
let cards    = [];
let history  = [];
let todos    = [];
let txns     = [];
let shopList = [];
let gsApi    = '';
let budget   = 0;
let editId   = null;
let todoFilter = 'all';
let txnType  = 'expense';
let calYear, calMonth;
let currentPage = 'cards';

// ── 初始化 ──
(function(){
  const now = new Date();
  calYear = now.getFullYear(); calMonth = now.getMonth();
  try{ cards    = JSON.parse(localStorage.getItem('cc_cards')||'[]');   }catch(e){}
  try{ history  = JSON.parse(localStorage.getItem('cc_history')||'[]'); }catch(e){}
  try{ todos    = JSON.parse(localStorage.getItem('yb_todos')||'[]');   }catch(e){}
  try{ txns     = JSON.parse(localStorage.getItem('yb_txns')||'[]');    }catch(e){}
  try{ shopList = JSON.parse(localStorage.getItem('yb_shop')||'[]');    }catch(e){}
  try{ gsApi    = localStorage.getItem('cc_api')||'';                   }catch(e){}
  try{ budget   = parseFloat(localStorage.getItem('yb_budget')||'0');   }catch(e){}
  const theme = localStorage.getItem('yb_theme')||'dark';
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('themeBtn').textContent = theme==='dark'?'🌙':'☀️';
  initLedgerMonthFilter();
  renderAll();
})();

function save(key, val){ localStorage.setItem(key, JSON.stringify(val)); }

// ── THEME ──
function toggleTheme(){
  const curr = document.documentElement.getAttribute('data-theme');
  const next = curr==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('yb_theme', next);
  document.getElementById('themeBtn').textContent = next==='dark'?'🌙':'☀️';
}

// ── PAGE SWITCH ──
function switchPage(page, el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('page-'+page).classList.add('on');
  el.classList.add('on');
  currentPage = page;
  const fab = document.getElementById('fab');
  fab.classList.toggle('hidden', page==='calendar'||page==='settings');
  if(page==='calendar') renderCalendar();
  if(page==='ledger')   renderLedger();
  if(page==='history')  renderHistory();
}

function onFab(){
  if(currentPage==='cards')  openAdd();
  if(currentPage==='todo')   openTodoModal();
  if(currentPage==='ledger') openTxnModal();
  if(currentPage==='shop')   openShopModal();
}

// ── RENDER ALL ──
function renderAll(){
  renderSummary(); renderList(); renderTodo();
  renderLedgerSummary(); renderShop(); checkAlerts(); updateGsStatus();
}

// ══ 信用卡 ══
function fmtMoney(n){ return n>0?'NT$'+Number(n).toLocaleString():'—'; }
function getNextDueDate(dueDay){
  const now=new Date();
  let due=new Date(now.getFullYear(),now.getMonth(),dueDay);
  if(due<=now) due=new Date(now.getFullYear(),now.getMonth()+1,dueDay);
  return due;
}
function daysUntilDue(dueDay){
  const now=new Date(); now.setHours(0,0,0,0);
  const due=getNextDueDate(dueDay); due.setHours(0,0,0,0);
  return Math.round((due-now)/(1000*60*60*24));
}
function fmtDueDate(dueDay){ const d=getNextDueDate(dueDay); return `${d.getMonth()+1}/${d.getDate()}`; }
function getStatus(card){
  if(card.paid) return 'paid';
  const d=daysUntilDue(card.dueDay);
  if(d<=0) return 'urgent'; if(d<=3) return 'warn'; if(d<=7) return 'soon'; return 'ok';
}
function getDaysLabel(card){
  if(card.paid) return '✓ 本期已繳';
  const d=daysUntilDue(card.dueDay);
  if(d<=0) return `逾期${Math.abs(d)}天！`; if(d===1) return '明天截止！'; return `還剩${d}天`;
}
function getUsagePct(card){
  if(!card.limit||card.limit<=0) return 0;
  return Math.min(100,Math.round((card.used/card.limit)*100));
}
function getBarClass(pct){ if(pct>=90)return'over';if(pct>=70)return'high';if(pct>=40)return'mid';return'low'; }

function renderSummary(){
  const active=cards.filter(c=>!c.paid);
  const due7=active.filter(c=>daysUntilDue(c.dueDay)<=7).length;
  const totalPayable=active.reduce((s,c)=>s+(Number(c.payable)||0),0);
  const totalRemain=active.reduce((s,c)=>s+(Math.max(0,(Number(c.limit)||0)-(Number(c.used)||0))),0);
  document.getElementById('sumCards').textContent=cards.length;
  document.getElementById('sumDue').textContent=due7;
  document.getElementById('sumPayable').textContent=totalPayable>0?'NT$'+totalPayable.toLocaleString():'—';
  document.getElementById('sumLimit').textContent=totalRemain>0?'NT$'+totalRemain.toLocaleString():'—';
  const urgentCount=active.filter(c=>daysUntilDue(c.dueDay)<=3).length;
  const dot=document.getElementById('navDot');
  if(dot) dot.classList.toggle('show',urgentCount>0);
}

function renderList(){
  const el=document.getElementById('cardList');
  if(!cards.length){ el.innerHTML=`<div class="empty"><div class="empty-ico">💳</div><p>還沒有信用卡<br>點右下角 ＋ 新增</p></div>`; return; }
  const sorted=[...cards].sort((a,b)=>{
    if(a.paid&&!b.paid) return 1; if(!a.paid&&b.paid) return -1;
    return daysUntilDue(a.dueDay)-daysUntilDue(b.dueDay);
  });
  el.innerHTML=sorted.map(c=>{
    const st=getStatus(c),dl=getDaysLabel(c);
    const dClass={urgent:'days-urgent',warn:'days-warn',soon:'days-soon',ok:'days-ok',paid:'days-paid'}[st];
    const pct=getUsagePct(c),barCls=getBarClass(pct);
    const remain=Math.max(0,(Number(c.limit)||0)-(Number(c.used)||0));
    return `<div class="cc-card ${st}">
      <div class="cc-header">
        <div class="cc-icon">💳</div>
        <div class="cc-info"><div class="cc-name">${c.bank}${c.name?' · '+c.name:''}</div><div class="cc-sub">每月${c.dueDay}號繳款${c.note?' · '+c.note:''}</div></div>
        <div class="cc-right"><div class="cc-due">📅 ${fmtDueDate(c.dueDay)}</div><div class="cc-days ${dClass}">${dl}</div></div>
      </div>
      ${c.limit>0?`<div class="usage-bar"><div class="usage-label"><span>已用${pct}%（${fmtMoney(c.used)}）</span><span>剩${fmtMoney(remain)}</span></div><div class="bar-track"><div class="bar-fill ${barCls}" style="width:${pct}%"></div></div></div>`:''}
      <div class="cc-body">
        <div class="cc-row"><span class="cc-rlabel">本期應繳</span><span class="cc-rval ${c.payable>0?'orange':''}">${fmtMoney(c.payable)}</span></div>
        <div class="cc-row"><span class="cc-rlabel">最低應繳</span><span class="cc-rval">${fmtMoney(c.minPayable)}</span></div>
        ${c.limit>0?`<div class="cc-row"><span class="cc-rlabel">剩餘額度</span><span class="cc-rval ${remain<5000?'red':'green'}">${fmtMoney(remain)}</span></div>`:''}
      </div>
      <div class="cc-actions">
        <button class="cc-btn pay" onclick="togglePaid('${c.id}')">${c.paid?'↩ 取消':'✓ 已繳款'}</button>
        <button class="cc-btn" onclick="openEdit('${c.id}')">✏️ 編輯</button>
        <button class="cc-btn del" onclick="delCard('${c.id}')">🗑 刪除</button>
      </div>
    </div>`;
  }).join('');
}

function togglePaid(id){
  const c=cards.find(x=>x.id===id); if(!c) return;
  c.paid=!c.paid;
  if(c.paid){
    const now=new Date();
    const rec={id:'h'+Date.now(),cardId:c.id,cardKey:c.bank+(c.name?' · '+c.name:''),
      billingMonth:`${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}`,
      payable:c.payable,minPayable:c.minPayable,limit:c.limit,used:c.used,note:c.note,
      paidAt:now.toISOString()};

}

async function delCard(id){

const CAT_ICO={餐飲:'🍜',交通:'🚗',購物:'🛍',娛樂:'🎬',醫療:'🏥',薪資:'💼',其他:'📦'};

function renderLedgerSummary(){
  const now=new Date();
  const ym=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const monthly=txns.filter(t=>t.date&&t.date.startsWith(ym));
  const income=monthly.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense=monthly.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  document.getElementById('ledIncome').textContent=income>0?'NT$'+income.toLocaleString():'—';
  document.getElementById('ledExpense').textContent=expense>0?'NT$'+expense.toLocaleString():'—';
  const bal=income-expense;
  const balEl=document.getElementById('ledBalance');
  balEl.textContent=bal!==0?'NT$'+Math.abs(bal).toLocaleString():'—';
  balEl.style.color=bal>=0?'var(--green)':'var(--red2)';
}

function renderLedger(){
  renderLedgerSummary();
  const selMonth=document.getElementById('ledMonth').value;
  const selCat=document.getElementById('ledCatFilter').value;
  let list=txns.filter(t=>t.date&&t.date.startsWith(selMonth));
  if(selCat) list=list.filter(t=>t.cat===selCat);
  list.sort((a,b)=>b.date.localeCompare(a.date));

  // 預算進度條
  const expense=txns.filter(t=>t.date&&t.date.startsWith(selMonth)&&t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const budgetWrap=document.getElementById('budgetWrap');
  if(budget>0){
    const pct=Math.min(100,Math.round((expense/budget)*100));
    const barCls=pct>=90?'over':pct>=70?'high':pct>=40?'mid':'low';
    document.getElementById('budgetLabel').textContent=`本月支出 NT$${expense.toLocaleString()} / NT$${budget.toLocaleString()}`;
    document.getElementById('budgetPct').textContent=`${pct}%`;
    const bar=document.getElementById('budgetBar');
    bar.style.width=pct+'%'; bar.className='bar-fill '+barCls;
    budgetWrap.style.display='';
  } else { budgetWrap.style.display='none'; }

  const el=document.getElementById('txnList');
  if(!list.length){ el.innerHTML=`<div class="empty"><div class="empty-ico">💰</div><p>本月還沒有記帳<br>點右下角 ＋ 新增</p></div>`; return; }
  el.innerHTML=list.map(t=>`<div class="txn-item">
    <div class="txn-cat ${t.type}">${CAT_ICO[t.cat]||'📦'}</div>
    <div class="txn-info">
      <div class="txn-desc">${t.desc||t.cat}</div>
      <div class="txn-meta">${t.cat} · ${t.date}</div>
    </div>
    <div class="txn-amount ${t.type}">${t.type==='income'?'+':'-'}NT$${Number(t.amount).toLocaleString()}</div>
    <button class="txn-del" onclick="delTxn('${t.id}')">🗑</button>
  </div>`).join('');
}

// ══ 月曆 ══
function calPrev(){ calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); }
function calNext(){ calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar(); }

function renderCalendar(){
  const MONTHS=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  const DAYS=['日','一','二','三','四','五','六'];
  document.getElementById('calMonth').textContent=`${calYear} 年 ${MONTHS[calMonth]}`;
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const today=new Date(); today.setHours(0,0,0,0);

  // 建立事件 map
  const ccMap={}, todoMap={};
  cards.forEach(c=>{ if(c.dueDay){if(!ccMap[c.dueDay])ccMap[c.dueDay]=[];ccMap[c.dueDay].push(c);} });
  todos.filter(t=>!t.done&&t.date&&t.date.startsWith(`${calYear}-${String(calMonth+1).padStart(2,'0')}`))
    .forEach(t=>{ const d=parseInt(t.date.split('-')[2]); if(!todoMap[d])todoMap[d]=[]; todoMap[d].push(t); });

  let html=DAYS.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=0;i<firstDay;i++) html+=`<div class="cal-day other-month"></div>`;
  for(let day=1;day<=daysInMonth;day++){
    const thisDate=new Date(calYear,calMonth,day); thisDate.setHours(0,0,0,0);
    const isToday=thisDate.getTime()===today.getTime();
    const ccDots=(ccMap[day]||[]).map(c=>`<div class="cal-dot cc"></div>`).join('');
    const todoDots=(todoMap[day]||[]).map(()=>`<div class="cal-dot todo"></div>`).join('');
    html+=`<div class="cal-day ${isToday?'today':''}"><div class="cal-day-num">${day}</div>${(ccDots||todoDots)?`<div class="cal-dots">${ccDots}${todoDots}</div>`:''}</div>`;
  }
  document.getElementById('calGrid').innerHTML=html;

  // 事件列表
  const evEl=document.getElementById('calEvents');
  const events=[];
  cards.forEach(c=>{ if(c.dueDay) events.push({day:c.dueDay,name:c.bank+(c.name?' · '+c.name:''),sub:c.payable>0?'應繳 NT$'+Number(c.payable).toLocaleString():'',type:'cc',status:getStatus(c)}); });
  todos.filter(t=>!t.done&&t.date&&t.date.startsWith(`${calYear}-${String(calMonth+1).padStart(2,'0')}`))
    .forEach(t=>{ const d=parseInt(t.date.split('-')[2]); events.push({day:d,name:t.title,sub:t.note||'',type:'todo',status:'todo'}); });
  events.sort((a,b)=>a.day-b.day);
  if(!events.length){ evEl.innerHTML=`<div class="empty" style="padding:30px 20px"><div class="empty-ico" style="font-size:2rem">📅</div><p>本月沒有事件</p></div>`; return; }
  const tagMap={cc:'tag-cc',urgent:'tag-urgent',warn:'tag-urgent',soon:'tag-cc',ok:'tag-cc',paid:'tag-paid',todo:'tag-todo'};
  const tagLabel={cc:'信用卡',urgent:'逾期！',warn:'快到期',soon:'即將到期',ok:'正常',paid:'已繳',todo:'待辦'};
  evEl.innerHTML=events.map(e=>`<div class="cal-ev">
    <div class="cal-ev-day">${e.day}</div>
    <div class="cal-ev-info"><div class="cal-ev-name">${e.name}</div>${e.sub?`<div class="cal-ev-sub">${e.sub}</div>`:''}</div>
    <div class="cal-ev-tag ${tagMap[e.status]||'tag-cc'}">${tagLabel[e.status]||''}</div>
  </div>`).join('');
}

// ══ 繳款紀錄 ══
function renderHistory(){
  const cardSel=document.getElementById('filterCard');
  const yearSel=document.getElementById('filterYear');
  const selCard=cardSel?.value||'';
  const selYear=yearSel?.value||'';
  if(cardSel){
    const cardNames=[...new Set(history.map(h=>h.cardKey))];
    cardSel.innerHTML='<option value="">所有信用卡</option>'+cardNames.map(k=>`<option value="${k}" ${k===selCard?'selected':''}>${k}</option>`).join('');
  }
  if(yearSel){
    const years=[...new Set(history.map(h=>h.paidAt?.slice(0,4)).filter(Boolean))].sort().reverse();
    yearSel.innerHTML='<option value="">所有年份</option>'+years.map(y=>`<option value="${y}" ${y===selYear?'selected':''}>${y}年</option>`).join('');
  }
  let list=[...history].sort((a,b)=>new Date(b.paidAt)-new Date(a.paidAt));
  if(selCard) list=list.filter(h=>h.cardKey===selCard);
  if(selYear) list=list.filter(h=>h.paidAt?.startsWith(selYear));
  const totalPaid=list.reduce((s,h)=>s+(Number(h.payable)||0),0);
  const sumEl=document.getElementById('histSummary');
  if(sumEl) sumEl.innerHTML=`<div class="sum-card" style="flex:1;min-width:90px"><div class="sum-val" style="color:var(--blue);font-size:1.2rem">${list.length}</div><div class="sum-label">筆數</div></div><div class="sum-card" style="flex:2;min-width:140px"><div class="sum-val" style="color:var(--green);font-size:1.2rem">${totalPaid>0?'NT$'+totalPaid.toLocaleString():'—'}</div><div class="sum-label">合計繳款</div></div>`;
  const el=document.getElementById('histList');
  if(!el) return;
  if(!list.length){ el.innerHTML=`<div class="empty"><div class="empty-ico">📋</div><p>還沒有繳款紀錄<br>點「✓ 已繳款」自動記錄</p></div>`; return; }
  el.innerHTML=list.map(h=>{
    const dt=h.paidAt?new Date(h.paidAt):null;
    const dtStr=dt?`${dt.getFullYear()}/${dt.getMonth()+1}/${dt.getDate()} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`:'—';
    return `<div class="hist-item"><div class="hist-top"><div><div class="hist-name">${h.cardKey}</div><div class="hist-month">${h.billingMonth||'—'} 帳單</div></div><div><div class="hist-amount">${h.payable>0?'NT$'+Number(h.payable).toLocaleString():'—'}</div><div class="hist-date">繳款：${dtStr}</div></div></div><div class="hist-tags">${h.minPayable>0?`<span class="hist-tag">最低 NT$${Number(h.minPayable).toLocaleString()}</span>`:''}${h.limit>0?`<span class="hist-tag">額度 NT$${Number(h.limit).toLocaleString()}</span>`:''}${h.used>0?`<span class="hist-tag">已刷 NT$${Number(h.used).toLocaleString()}</span>`:''}${h.note?`<span class="hist-tag">${h.note}</span>`:''}</div></div>`;
  }).join('');
}

// ══ 預算 ══
function openBudgetModal(){
  document.getElementById('budgetInput').value=budget||'';
  document.getElementById('budgetOverlay').classList.add('on');
}
function closeBudgetModal(){ document.getElementById('budgetOverlay').classList.remove('on'); }
function saveBudget(){
  budget=parseFloat(document.getElementById('budgetInput').value)||0;
  localStorage.setItem('yb_budget',budget);
  closeBudgetModal(); renderLedger();
  const el=document.getElementById('budgetDisplay');
  if(el) el.textContent=budget>0?`NT$${budget.toLocaleString()} / 月`:'未設定';
  toast('預算已設定 ✓','ok');
}

// ══ GS 同步 ══
async function pushCard(c){
  if(!gsApi) return;
  try{ const enc=btoa(unescape(encodeURIComponent(JSON.stringify(c)))); await fetch(gsApi+'?action=saveCard&b64=1&data='+encodeURIComponent(enc)); }catch(e){}
}
async function pushHistory(rec){
  if(!gsApi) return;
  try{ const enc=btoa(unescape(encodeURIComponent(JSON.stringify(rec)))); await fetch(gsApi+'?action=saveHistory&b64=1&data='+encodeURIComponent(enc)); }catch(e){}
}
function openGsModal(){ if(gsApi) document.getElementById('gsApi').value=gsApi; document.getElementById('gsOverlay').classList.add('on'); }
function closeGsModal(){ document.getElementById('gsOverlay').classList.remove('on'); }
function clearGsApi(){ gsApi=''; localStorage.removeItem('cc_api'); document.getElementById('gsApi').value=''; updateGsStatus(); toast('已清除網址','warn'); }
function saveGS(){ gsApi=document.getElementById('gsApi').value.trim(); localStorage.setItem('cc_api',gsApi); closeGsModal(); if(gsApi) syncNow(); else toast('請填入網址','err'); }

async function syncNow(){
  if(!gsApi){ openGsModal(); return; }
  const btn=document.getElementById('syncBtn');
  if(btn){ btn.textContent='⏳'; btn.disabled=true; }
  try{
    const res=await fetch(gsApi+'?action=getAll&_t='+Date.now());
    const data=await res.json();
    if(data.success){
      if(data.cards){
        const m={}; data.cards.forEach(c=>m[c.id]=c);
        cards=cards.map(c=>m[c.id]?{...m[c.id]}:c);
        const lids=new Set(cards.map(c=>c.id));
        data.cards.forEach(c=>{ if(!lids.has(c.id)) cards.push(c); });
        save('cc_cards',cards);
      }
      if(data.history){
        const lhids=new Set(history.map(h=>h.id));
        data.history.forEach(h=>{ if(!lhids.has(h.id)) history.push(h); });
        const chids=new Set(data.history.map(h=>h.id));
        const toUp=history.filter(h=>!chids.has(h.id));
        for(const r of toUp) await pushHistory(r);
        save('cc_history',history);
      }
      renderAll();
      toast(`✓ 同步完成，${cards.length}張卡 · ${history.length}筆紀錄`,'ok');
    }
  }catch(e){ toast('同步失敗：'+e.message,'err'); }
  finally{ if(btn){ btn.textContent='🔄'; btn.disabled=false; } }
}

function updateGsStatus(){
  const el=document.getElementById('gsStatus2');
  if(el) el.textContent=gsApi?'✓ 已設定':'尚未設定';
  const budgetEl=document.getElementById('budgetDisplay');
  if(budgetEl) budgetEl.textContent=budget>0?`NT$${budget.toLocaleString()} / 月`:'未設定';
}

async function clearAll(){
  if(!await myConfirm('確定清除所有本機資料？（信用卡、待辦、記帳、購物清單、繳款紀錄）')) return;
  cards=[];history=[];todos=[];txns=[];shopList=[];
  ['cc_cards','cc_history','yb_todos','yb_txns','yb_shop'].forEach(k=>localStorage.removeItem(k));
  renderAll(); toast('已清除','err');
}

// ══ CONFIRM ══
let _cr=null;
function confirmResolve(v){ document.getElementById('confirmOverlay').classList.remove('on'); if(_cr)_cr(v); _cr=null; }
function myConfirm(msg){ document.getElementById('confirmMsg').textContent=msg; document.getElementById('confirmOverlay').classList.add('on'); return new Promise(r=>_cr=r); }

function toast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast show ${type}`;
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2800);
}

['addOverlay','todoOverlay','txnOverlay','shopOverlay','gsOverlay','budgetOverlay','confirmOverlay'].forEach(id=>{
  const el=document.getElementById(id);
  if(el) el.addEventListener('click',function(e){
    if(e.target===this){ this.classList.remove('on'); if(id==='confirmOverlay') confirmResolve(false); }
  });
});

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').catch(e=>console.log('SW fail',e));
  });
}
